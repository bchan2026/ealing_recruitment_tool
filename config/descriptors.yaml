universal_metrics:

  General:
    - All Players Season__Minutes Played
    - All Players Season__Appearances
    - All Players Season__Points

  Attack:
    - All Players Season__Carries
    - All Players Season__Carry Metres Made
    - All Players Season__Post Contact Metres
    - All Players Season__Offload
    - All Players Season__Try Scored
    - All Players Season__Try Assist

  Defence:
    - Tackles__Total Attempted Tackles
    - Tackles__Percent Tackle Made
    - Tackles__Dominant Tackle Percent

  Breakdown:
    - Ruck Entries__Attacking Ruck Entries
    - Ruck Entries__Defensive Ruck Entries

  Discipline:
    - Pens Conceded__Penalty Conceded
    - Pens Conceded__Yellow Card
    - Pens Conceded__Red Card

  Error Rate:
    - Turnover Conceded__Percent Unforced
    - Turnover Conceded__Handling Error


position_groups:

  fly-half:
    positions: ["fly-half"]
    metrics:
      Kicking:
        - Kicks__Kicks In Play
        - Kicks__Total Kick In Play Metres
        - Kicks__Fifty Twenty Two Kick
        - All Players Season__Percent Goals

  fullback:
    positions: ["fullback"]
    metrics:
      Kicking:
        - Kicks__Kicks In Play
        - Kicks__Total Kick In Play Metres
        - Kicks__Fifty Twenty Two Kick
        - All Players Season__Percent Goals

  centre:
    positions: ["centre"]
    metrics:
      Kicking:
        - Kicks__Kicks In Play
        - Kicks__Total Kick In Play Metres
        - Kicks__Fifty Twenty Two Kick
        - All Players Season__Percent Goals

  wing:
    positions: ["wing"]
    metrics:
      Kicking:
        - Kicks__Kicks In Play
        - Kicks__Total Kick In Play Metres
        - Kicks__Fifty Twenty Two Kick
        - All Players Season__Percent Goals

  scrum-half:
