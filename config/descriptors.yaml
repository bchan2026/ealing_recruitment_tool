      Set Piece:
        - Lineout Throws__Total Lineout Throws
        - Lineout Throws__Lineout Throws Won Percent
        - Lineout Throws__Throw Back
        - Lineout Throws__Throw Front
        - Lineout Throws__Throw Middle

  prop:
    positions: ["prop"]
    metrics:
      Discipline:
        - Pens Conceded__Scrum Offence

  number-8:
    positions: ["number 8", "no. 8", "8"]
    metrics:
      Set Piece:
        - Lineout Catch__Lo Contest Clean Catch
        - Lineout Catch__Lo Contest Steal
      Breakdown:
        - Turnover Won__Jackal Penalty Won
        - Turnover Won__Jackal Turnover Won
      Defence:
        - Turnover Won__Tackle Turnover Won

  flanker:
    positions: ["flanker"]
